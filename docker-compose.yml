version: "3.9"

# ═══════════════════════════════════════════════════════════════════
#  docker-compose.yml  –  CRUD Contacts App
#  Services : app | trivy (scan)
# ═══════════════════════════════════════════════════════════════════

services:

  # ── Application Flask ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: crud-contacts:${IMAGE_TAG:-latest}
    container_name: crud_contacts_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - PYTHONUNBUFFERED=1
    networks:
      - contacts_net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Trivy : scan de vulnérabilités ────────────────────────────
  trivy:
    image: aquasec/trivy:latest
    container_name: trivy_scanner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - trivy-cache:/root/.cache/trivy
      - ./trivy-reports:/reports
    entrypoint: >
      trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --format table
        --output /reports/trivy-report.txt
        crud-contacts:${IMAGE_TAG:-latest}
    networks:
      - contacts_net
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - scan   # lancé uniquement via : docker compose --profile scan up trivy

# ── Volumes ────────────────────────────────────────────────────────
volumes:
  trivy-cache:
    driver: local
  trivy-reports:
    driver: local

# ── Réseau interne ─────────────────────────────────────────────────
networks:
  contacts_net:
    driver: bridge
